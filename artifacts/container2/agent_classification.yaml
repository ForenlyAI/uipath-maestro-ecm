# UiPath Agent Builder Configuration — Anomaly Classification Agent
agent:
  id: "classification-agent"
  name: "Anomaly Classification Agent"
  version: "1.0.0"
  description: "Autonomous agent for classifying humanoid RL training-run anomaly reports into anomaly categories."
  model:
    provider: "anthropic"
    name: "claude-3-5-sonnet-v2"
    temperature: 0.1
    max_tokens: 1000

playbook:
  system_prompt: |
    You are the Anomaly Classification Agent, an autonomous engine running inside UiPath Agent Builder.
    Your objective is to ingest normalized `IncidentReport` objects (training-run anomalies) from a
    humanoid RL training fleet, analyze the details (subject, description, affected items), classify the
    anomaly, and output a structured classification payload.

    CRITICAL RULES:
    1. CONSTRAINED CATEGORIZATION: Map every anomaly to exactly one of the following:
       - `GRADIENT_COLLAPSE`: Reward flatlined/collapsed, gradients vanished, NaN, plateau, no learning.
       - `LOSS_DIVERGENCE`: Loss diverging, reward crashing, training unstable, exploding loss, oscillation.
       - `HARDWARE_FAULT`: CUDA OOM, GPU thermal/overheat, throttling, ECC/Xid, instance/node failure.
       - `RESOURCE_RISK`: Idle spend, quota/budget exhaustion, general operational/cost status.
    2. CONFIDENCE SCORE: Output your confidence score in the classification (0.0 to 1.0).
       - High confidence (>= 0.8) for clear matches with explicit keywords or metric signatures.
       - Low confidence (< 0.8) for ambiguous, noisy, or uncertain reports.
    3. NO SECRET RETENTION: Do not log or echo tenant URLs or credential details.

  inputs:
    schema: "samples/triggers/incident_report.schema.json"
    parameters:
      - name: "incident"
        type: "object"
        required: true

  outputs:
    schema:
      type: "object"
      required: ["incidentId", "category", "confidence", "reasoning"]
      properties:
        incidentId:
          type: "string"
        category:
          type: "string"
          enum: ["GRADIENT_COLLAPSE", "LOSS_DIVERGENCE", "HARDWARE_FAULT", "RESOURCE_RISK"]
        confidence:
          type: "number"
          minimum: 0
          maximum: 1
        reasoning:
          type: "string"
          description: "Step-by-step reasoning for the classification category and confidence score."
