# UiPath Agent Builder Configuration — Vision AI Analyst Agent
agent:
  id: "vision-ai-analyst"
  name: "Vision AI Analyst Agent"
  version: "1.0.0"
  description: "Autonomous agent for classifying anomalous field inspection incident reports and assessing regulatory/economic impact."
  model:
    provider: "anthropic"
    name: "claude-3-5-sonnet-v2"
    temperature: 0.1
    max_tokens: 1500

playbook:
  system_prompt: |
    You are the Sentinel Core Vision AI Analyst, an autonomous engine running inside UiPath Agent Builder.
    Your objective is to ingest normalized `IncidentReport` objects, analyze the attached telemetry/optical reports, classify the anomaly, and output a structured decision payload.

    CRITICAL RULES FOR DECISION MAKING:
    1. CONSTRAINED CATEGORIZATION: Map every anomaly to one of: `STRUCTURAL_DEFECT`, `WIRING_FAULT`, `COMMODITY_VARIANCE`, `OPERATIONAL_RISK`.
    2. SAFETY RISK INDEX (Re) CALCULATION:
       - Baseline Re = 0.05
       - If `severity` is "critical", add 0.50. If "high", add 0.25. If "medium", add 0.10.
       - If `complianceClass` is AS9100 or ISO13485 (highly regulated aerospace/medical), multiply risk score by 1.5.
       - If `detectorConfidence` < 0.8, increase risk by 0.15 (handling sensor uncertainty).
    3. HUMAN-IN-THE-LOOP (HITL) GATEWAY TRIGGER:
       - You must output an execution 'confidence' score (0.0 to 1.0).
       - If your confidence in the classification is < 0.70 OR if the calculated `riskScore` >= 0.15, flag `hitlRequired: true`.
       - This will force UiPath Maestro to routing to the Compliance Review Board (Action Center).
    4. NO SECRET RETENTION: Do not log or echo tenant URLs or credential details.

  inputs:
    schema: "samples/triggers/incident_report.schema.json"
    parameters:
      - name: "incident"
        type: "object"
        required: true

  outputs:
    schema:
      type: "object"
      required: ["incidentId", "category", "riskScore", "confidence", "hitlRequired", "reasoning", "suggestedAction"]
      properties:
        incidentId:
          type: "string"
        category:
          type: "string"
          enum: ["STRUCTURAL_DEFECT", "WIRING_FAULT", "COMMODITY_VARIANCE", "OPERATIONAL_RISK"]
        riskScore:
          type: "number"
          minimum: 0
          maximum: 1
        confidence:
          type: "number"
          minimum: 0
          maximum: 1
        hitlRequired:
          type: "boolean"
        reasoning:
          type: "string"
          description: "Step-by-step cognitive deduction details."
        suggestedAction:
          type: "string"
          enum: ["REWORK", "SCRAP", "AUDIT", "HOLD", "PROCEED"]

examples:
  - input:
      incident:
        incidentId: "IR-20260520-0001"
        source:
          type: "vision"
          name: "aoi-vision"
          detectorConfidence: 0.95
        occurredAt: "2026-05-29T12:00:00Z"
        severity: "medium"
        subject: "NG_WIRING: misrouted cable, panel A-12"
        description: "Laser scanning indicates cable branch 7 is routed outside the designated channel by 12mm, breaching spacing specification."
        affectedItems:
          - itemId: "BOM-A12.cable.7"
            itemType: "bom-line"
        complianceClass: "iso10007"
    output:
      incidentId: "IR-20260520-0001"
      category: "WIRING_FAULT"
      riskScore: 0.15
      confidence: 0.92
      hitlRequired: true
      reasoning: "Classification is highly confident (0.92) as a WIRING_FAULT due to laser scan telemetry. Risk is scored at 0.15 (base 0.05 + 0.10 medium severity), reaching the HITL threshold. Manual verification is required to authorize rework of branch 7 on panel A-12."
      suggestedAction: "REWORK"
