# UiPath Agent Builder Configuration — Telemetry Analyst Agent
agent:
  id: "telemetry-analyst"
  name: "Telemetry Analyst Agent"
  version: "1.0.0"
  description: "Autonomous agent for classifying humanoid RL training-run anomaly reports and assessing risk/economic (cloud GPU) impact."
  model:
    provider: "anthropic"
    name: "claude-3-5-sonnet-v2"
    temperature: 0.1
    max_tokens: 1500

playbook:
  system_prompt: |
    You are the Telemetry Analyst, an autonomous engine running inside UiPath Agent Builder.
    Your objective is to ingest normalized `IncidentReport` objects (training-run anomalies)
    from a humanoid RL training fleet, analyze the attached reward/loss telemetry and logs,
    classify the anomaly, and output a structured decision payload.

    CRITICAL RULES FOR DECISION MAKING:
    1. CONSTRAINED CATEGORIZATION: Map every anomaly to one of: `GRADIENT_COLLAPSE`, `LOSS_DIVERGENCE`, `HARDWARE_FAULT`, `RESOURCE_RISK`.
    2. ANOMALY RISK SCORE CALCULATION:
       - Baseline risk = 0.05
       - If `severity` is "critical", add 0.50. If "high", add 0.25. If "medium", add 0.10.
       - If `safetyZone` is a critical zone (high-cost-gpu, production-bound, public-benchmark, long-running), multiply risk score by 1.5.
       - If `detectorConfidence` < 0.8, increase risk by 0.15 (handling detector uncertainty).
    3. HUMAN-IN-THE-LOOP (HITL) GATEWAY TRIGGER:
       - You must output an execution 'confidence' score (0.0 to 1.0).
       - If your confidence in the classification is < 0.70 OR if the calculated `riskScore` >= 0.15, flag `hitlRequired: true`.
       - This forces UiPath Maestro to route to the Researcher Review Board (Action Center).
    4. NO SECRET RETENTION: Do not log or echo tenant URLs or credential details.

  inputs:
    schema: "samples/triggers/incident_report.schema.json"
    parameters:
      - name: "incident"
        type: "object"
        required: true

  outputs:
    schema:
      type: "object"
      required: ["incidentId", "category", "riskScore", "confidence", "hitlRequired", "reasoning", "suggestedAction"]
      properties:
        incidentId:
          type: "string"
        category:
          type: "string"
          enum: ["GRADIENT_COLLAPSE", "LOSS_DIVERGENCE", "HARDWARE_FAULT", "RESOURCE_RISK"]
        riskScore:
          type: "number"
          minimum: 0
          maximum: 1
        confidence:
          type: "number"
          minimum: 0
          maximum: 1
        hitlRequired:
          type: "boolean"
        reasoning:
          type: "string"
          description: "Step-by-step cognitive deduction details."
        suggestedAction:
          type: "string"
          enum: ["RESTART", "TERMINATE", "INSPECT", "HOLD", "PROCEED"]

examples:
  - input:
      incident:
        incidentId: "IR-20260607-0001"
        source:
          type: "telemetry"
          name: "reward-monitor"
          detectorConfidence: 0.91
        occurredAt: "2026-06-07T08:14:10Z"
        severity: "high"
        subject: "GRADIENT_COLLAPSE: reward flatlined and gradients vanished at step 60k on walk-gait-v2"
        description: "Reward telemetry shows the policy reward collapsed to baseline and gradient norms vanished toward zero; no learning for 20k steps on an H100 spot instance."
        affectedItems:
          - itemId: "job-walk-gait-v2"
            itemType: "job"
        safetyZone: "high-cost-gpu"
    output:
      incidentId: "IR-20260607-0001"
      category: "GRADIENT_COLLAPSE"
      riskScore: 0.45
      confidence: 0.92
      hitlRequired: true
      reasoning: "Classified as GRADIENT_COLLAPSE with high confidence from reward telemetry. Risk 0.45 (base 0.05 + 0.25 high severity, x1.5 for the high-cost-gpu zone), well over the HITL threshold. The run is on an expensive GPU pool, so a human must authorize a restart before more budget is burned."
      suggestedAction: "RESTART"
