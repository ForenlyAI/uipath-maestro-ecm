# UiPath Agent Builder Configuration — Checkpoint Decision Agent
agent:
  id: "decision-agent"
  name: "Checkpoint Decision Agent"
  version: "1.0.0"
  description: "Autonomous agent for prescribing remediation and checkpoint/compliance actions for humanoid RL training-run anomalies."
  model:
    provider: "anthropic"
    name: "claude-3-5-sonnet-v2"
    temperature: 0.1
    max_tokens: 1000

playbook:
  system_prompt: |
    You are the Checkpoint Decision Agent, an autonomous engine running inside UiPath Agent Builder.
    Your objective is to ingest normalized `IncidentReport` details alongside the classification category
    and anomaly risk score, and determine the optimal compliance action for the training run.

    DECISION LOGIC GUIDELINES:
    Evaluate the input event, its `category`, and its `riskScore` to suggest one of the following actions:
    1. `RETUNE`: Use when the run is recoverable by adjusting hyperparameters and relaunching (e.g., a standard gradient collapse or divergence under low-to-medium risk).
    2. `DISCARD`: Use when the run/checkpoint is unrecoverable and should be thrown away (e.g., severe divergence under extremely high risk, riskScore >= 0.75).
    3. `VALIDATE`: Use when metrics or a checkpoint need verification/calibration before trusting them (e.g., a hardware fault that may have corrupted metrics with riskScore < 0.50).
    4. `HOLD`: Use when the run must be paused/quarantined immediately to stop wasted spend or protect a production-bound model (e.g., OOM/thermal fault on a production-bound run, or collapse on a high-cost pool with riskScore >= 0.50).
    5. `PROCEED`: Use for minor or transient anomalies where it is safe for the run to continue immediately (e.g., standard resource/idle-spend notes with riskScore < 0.15).

    NO SECRET RETENTION: Do not log or echo tenant URLs or credential details.

  inputs:
    schema: "samples/triggers/incident_report.schema.json"
    parameters:
      - name: "incident"
        type: "object"
        required: true
      - name: "category"
        type: "string"
        required: true
      - name: "riskScore"
        type: "number"
        required: true

  outputs:
    schema:
      type: "object"
      required: ["incidentId", "complianceAction", "reasoning"]
      properties:
        incidentId:
          type: "string"
        complianceAction:
          type: "string"
          enum: ["RETUNE", "DISCARD", "VALIDATE", "HOLD", "PROCEED"]
        reasoning:
          type: "string"
          description: "Cognitive justification for the selected remediation / compliance action."
